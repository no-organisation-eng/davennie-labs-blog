<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <circle cx="1000" cy="150" r="300" fill="#38bdf8" fill-opacity="0.03" filter="blur(80px)" />
  <circle cx="200" cy="500" r="250" fill="#a855f7" fill-opacity="0.03" filter="blur(60px)" />

  <!-- Borders -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Logo Icon -->
  <g transform="translate(80, 80) scale(0.8)">
    <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(56, 189, 248, 0.3)" stroke-width="1.5" stroke-dasharray="6 4" />
    <path d="M55 20 L35 50 H50 L45 80 L65 50 H50 Z" fill="url(#accentGrad)" />
  </g>

  <!-- Brand Text -->
  <text x="180" y="112" fill="#ffffff" font-family="'Inter', sans-serif" font-size="28" font-weight="800" letter-spacing="4">DAVENNIE LABS</text>
  <text x="180" y="142" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500">SYSTEMS &amp; YIELD BLUEPRINTS</text>

  <!-- Title / Hook -->
  <text x="80" y="320" fill="#ffffff" font-family="'Inter', sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Zero-Trust Agentic Architecture</text>
  <text x="80" y="390" fill="#38bdf8" font-family="'Inter', sans-serif" font-size="36" font-weight="700">Scaling Automated Digital Assets</text>
  
  <text x="80" y="470" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="20" font-weight="400">
    Radical developer leverage: serverless edge setups, zero Cumulative Layout Shift (CLS)
  </text>
  <text x="80" y="505" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="20" font-weight="400">
    monetization pipelines, and schema-enforced programmatic SEO.
  </text>

  <!-- Decorative technical node -->
  <g transform="translate(900, 360)">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="rgba(56, 189, 248, 0.2)" stroke-width="2" stroke-dasharray="5 5" />
    <line x1="0" y1="-100" x2="0" y2="100" stroke="rgba(56, 189, 248, 0.2)" stroke-width="2" stroke-dasharray="5 5" />
    <circle cx="0" cy="0" r="40" fill="#0b0f19" stroke="url(#accentGrad)" stroke-width="3" />
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1" />
    <text x="0" y="6" fill="#38bdf8" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700" text-anchor="middle">EDGE</text>
  </g>
</svg>
