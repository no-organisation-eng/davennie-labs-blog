<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5"/>

  <!-- Simulated Content Layout with ad container -->
  <g transform="translate(50, 40)">
    <!-- Header simulation -->
    <rect x="0" y="0" width="700" height="20" rx="4" fill="rgba(255,255,255,0.08)" />
    <rect x="0" y="30" width="400" height="15" rx="4" fill="rgba(255,255,255,0.04)" />
    
    <!-- Stable ad container box -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="700" height="220" rx="8" fill="rgba(22, 28, 45, 0.6)" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6 4" />
      <text x="350" y="90" fill="#38bdf8" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" text-anchor="middle">STABLE CSS WRAPPER (min-height: 220px)</text>
      <text x="350" y="125" fill="rgba(255, 255, 255, 0.3)" font-family="'Inter', sans-serif" font-size="13" text-anchor="middle">Holds space open. Prevents Cumulative Layout Shift (CLS)</text>
      
      <!-- Loaded Google AdSense simulation unit inside -->
      <rect x="150" y="150" width="400" height="50" rx="4" fill="#0b0f19" stroke="rgba(56, 189, 248, 0.4)" stroke-width="1" />
      <text x="350" y="180" fill="#38bdf8" font-family="'Inter', sans-serif" font-size="14" font-weight="700" text-anchor="middle">💰 HIGH-VALUE ADSENSE UNIT ACTIVE</text>
    </g>

    <!-- Bottom content text simulation -->
    <rect x="0" y="320" width="700" height="15" rx="4" fill="rgba(255,255,255,0.08)" />
    <rect x="0" y="345" width="700" height="15" rx="4" fill="rgba(255,255,255,0.08)" />
    <rect x="0" y="370" width="500" height="15" rx="4" fill="rgba(255,255,255,0.04)" />
  </g>
</svg>
